<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quoizel Inventory Lookup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">QUOIZEL</div>
      <h1>Inventory Lookup</h1>
      <p>Search by SKU, partial SKU, or UPC.</p>

      <input
        id="searchInput"
        type="search"
        placeholder="Example: MOI84 or 611728"
        autocomplete="off"
      />

      <div id="message" class="message"></div>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
