<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quoizel Inventory Lookup</title>
  <link rel="stylesheet" href="./style.css?v=2" />
</head>
<body>
 <body>

<div id="passwordGate" class="password-gate">
  <div class="password-box">
    <h2>Quoizel Inventory Lookup</h2>
    <p>Please enter the password to continue.</p>

    <input
      type="password"
      id="passwordInput"
      placeholder="Password"
      autocomplete="off"
    />

    <button id="loginButton">Continue</button>

    <p id="passwordError" class="password-error"></p>
  </div>
</div>

<div id="app" style="display:none;">

  <main class="inventory-app">

    <section class="lookup-panel">
      <p class="lookup-intro">
        Search by SKU, partial SKU, or UPC:
      </p>

      <input
        id="searchInput"
        class="lookup-input"
        type="search"
        placeholder="Example: MAE8406MBK, MAE, or 611728335680"
        autocomplete="off"
      />

      <div class="lookup-meta">
        <div id="lastUpdated" class="last-updated"></div>
        <div id="message" class="message"></div>
      </div>
    </section>

    <section id="results" class="results"></section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</body>
</html>
